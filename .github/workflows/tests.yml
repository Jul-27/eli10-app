name: Dokuvo Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-tests:
    name: API Tests (Supertest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Dependencies installieren
        run: npm install

      - name: API Tests ausführen
        run: npm run test:api
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://eli10-app-olxw.vercel.app' }}

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: api-tests
    steps:
      - uses: actions/checkout@v4

      - name: Node.js Setup
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Dependencies installieren
        run: npm install

      - name: Playwright Browser installieren
        run: npx playwright install chromium --with-deps

      - name: E2E Tests ausführen
        run: npm run test:e2e
        env:
          BASE_URL: ${{ secrets.BASE_URL || 'https://eli10-app-olxw.vercel.app' }}
          TEST_EMAIL: ${{ secrets.TEST_EMAIL }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Test-Report hochladen (bei Fehler)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Screenshots hochladen (bei Fehler)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 7