<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dokuvo — Willkommen bei Premium!</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0D0D0D;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 30px 20px;
      color: #F1F5F9;
    }
    .card {
      background: #1C1C1E;
      border: 1.5px solid #2C2C2E;
      border-radius: 16px;
      padding: 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    h1 { color: #34D399; font-size: 2rem; margin: 16px 0; }
    p { color: #AEAEB2; margin-bottom: 24px; line-height: 1.6; }
    a {
      display: block;
      padding: 14px;
      background: #3B82F6;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.2s;
    }
    a:hover { background: #2563EB; }
  </style>
</head>
<body>
  <div class="card">
    <div style="font-size:4rem;">🎉</div>
    <h1>Willkommen bei Premium!</h1>
    <p>Deine Zahlung war erfolgreich. Du hast jetzt unlimitierten Zugang zu Dokuvo Premium.</p>
    <a href="/app">Zur App →</a>
  </div>
</body>
</html>
