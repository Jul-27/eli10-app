<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ELI10 — Einfach erklärt</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px;
    }
    h1 { font-size: 2rem; color: #2563eb; margin-bottom: 8px; }
    .subtitle { color: #6b7280; margin-bottom: 30px; text-align: center; }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 10px;
      outline: none;
    }
    input:focus { border-color: #2563eb; }
    textarea {
      width: 100%;
      height: 150px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      padding: 14px;
      font-size: 1rem;
      resize: vertical;
      outline: none;
    }
    textarea:focus { border-color: #2563eb; }
    button {
      margin-top: 14px;
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    .secondary-btn {
      background: white;
      color: #2563eb;
      border: 2px solid #2563eb;
      margin-top: 8px;
    }
    .secondary-btn:hover { background: #f0f4ff; }
    .result-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 100%;
      max-width: 600px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      display: none;
    }
    .result-card h2 { color: #2563eb; margin-bottom: 12px; }
    .result-text { color: #374151; line-height: 1.7; white-space: pre-wrap; }
    .loading { text-align: center; color: #6b7280; font-style: italic; }
    .disclaimer {
      font-size: 0.75rem;
      color: #9ca3af;
      text-align: center;
      margin-top: 20px;
      max-width: 600px;
    }
    .user-info {
      text-align: right;
      width: 100%;
      max-width: 600px;
      margin-bottom: 10px;
      color: #6b7280;
      font-size: 0.9rem;
    }
    .user-info span { color: #2563eb; font-weight: bold; }
    .logout-btn {
      background: none;
      border: none;
      color: #dc2626;
      cursor: pointer;
      font-size: 0.9rem;
      margin-left: 10px;
      padding: 0;
      width: auto;
      margin-top: 0;
    }
    .error { color: #dc2626; font-size: 0.9rem; margin-top: 8px; }
    .success { color: #059669; font-size: 0.9rem; margin-top: 8px; }
  </style>
</head>
<body>

  <h1>🧒 ELI10</h1>
  <p class="subtitle">Füge einen komplexen Text ein — wir erklären ihn einfach.</p>

  <!-- Auth Screen -->
  <div class="card" id="authCard">
    <h2 style="color:#2563eb; margin-bottom:16px;" id="authTitle">Anmelden</h2>
    <input type="email" id="emailInput" placeholder="E-Mail Adresse" />
    <input type="password" id="passwordInput" placeholder="Passwort" />
    <div id="authMessage"></div>
    <button onclick="login()">🔐 Anmelden</button>
    <button class="secondary-btn" onclick="register()">✨ Neu registrieren</button>
  </div>

  <!-- App Screen (nach Login) -->
  <div id="appScreen" style="display:none; width:100%; display:none; flex-direction:column; align-items:center;">
    <div class="user-info">
      Eingeloggt als <span id="userEmail"></span>
      <button class="logout-btn" onclick="logout()">Abmelden</button>
      <div style="font-size:0.85rem; color:#6b7280; margin-top:4px;">
        Verbleibende Erklärungen heute: <span id="remainingCount" style="color:#2563eb; font-weight:bold;">5</span>
      </div>
    </div>

    <div class="card">
      <div style="margin-bottom:16px;">
        <p style="color:#374151; font-weight:bold; margin-bottom:8px;">📄 Dokument hochladen:</p>
        <input type="file" id="fileInput" accept=".pdf" style="display:none" onchange="dokumentHochladen()">
        <button onclick="document.getElementById('fileInput').click()" style="background:#7c3aed; color:white; border:none; padding:12px 20px; border-radius:10px; font-size:0.95rem; cursor:pointer; font-weight:bold; width:100%;">
          📎 PDF hochladen und erklären
        </button>
      </div>
      <input type="file" id="imageInput" accept="image/*" capture="environment" style="display:none" onchange="fotoAnalysieren()">
<button onclick="document.getElementById('imageInput').click()" style="background:#059669; color:white; border:none; padding:12px 20px; border-radius:10px; font-size:0.95rem; cursor:pointer; font-weight:bold; width:100%; margin-bottom:12px;">
  📷 Foto machen und erklären
</button>
<div style="text-align:center; color:#9ca3af; margin-bottom:12px; font-size:0.9rem;">— oder Text direkt eingeben —</div>
      <textarea id="inputText" placeholder="Füge hier deinen Text ein... z.B. einen Vertragsabschnitt, einen Arztbrief oder einen Behördenbrief."></textarea>
      <button id="explainBtn" onclick="erklaeren()">✨ Jetzt erklären</button>
    </div>

    <div class="result-card" id="resultCard">
      <h2>📖 Erklärung</h2>
      <div class="result-text" id="resultText"></div>
    </div>
  </div>

  <div id="historySection" style="display:none; width:100%; max-width:600px; margin-bottom:20px;">
    <div style="background:white; border-radius:16px; padding:24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);">
      <h2 style="color:#2563eb; margin-bottom:16px;">🕐 Mein Verlauf</h2>
      <div id="historyList"></div>
    </div>
  </div>

  <p class="disclaimer">⚠️ ELI10 ist kein Ersatz für rechtliche, medizinische oder steuerliche Beratung.</p>

<script>

  const { createClient } = supabase;
  const supabaseClient = createClient(
    'https://srmpdeqpwikjdbwjudqs.supabase.co',
    'sb_publishable_bVb-24sFpnG6sPxDvmwqfw_F4_F9Mcw'
  );
  
  window.addEventListener('load', async () => {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) { zeigeApp(session.user.email); }
  });
  
  async function login() {
    const email = document.getElementById('emailInput').value;
    const password = document.getElementById('passwordInput').value;
    const msg = document.getElementById('authMessage');
    const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
    if (error) {
      msg.className = 'error';
      msg.textContent = 'Fehler: ' + error.message;
    } else {
      const { data: { session } } = await supabaseClient.auth.getSession();
      zeigeApp(session.user.email);
    }
  }
  
  async function register() {
    const email = document.getElementById('emailInput').value;
    const password = document.getElementById('passwordInput').value;
    const msg = document.getElementById('authMessage');
    if (password.length < 6) {
      msg.className = 'error';
      msg.textContent = 'Passwort muss mindestens 6 Zeichen haben.';
      return;
    }
    const { data, error } = await supabaseClient.auth.signUp({ email, password });
    if (error) {
      msg.className = 'error';
      msg.textContent = 'Fehler: ' + error.message;
    } else {
      zeigeApp(email);
    }
  }
  
  async function logout() {
    await supabaseClient.auth.signOut();
    document.getElementById('appScreen').style.display = 'none';
    document.getElementById('authCard').style.display = 'block';
  }
  
  async function zeigeApp(email) {
  document.getElementById('authCard').style.display = 'none';
  document.getElementById('appScreen').style.display = 'flex';
  document.getElementById('userEmail').textContent = email;

  // Premium-Status prüfen und Zähler aktualisieren
  const { data: { session } } = await supabaseClient.auth.getSession();
  const user_id = session?.user?.id;

  const response = await fetch('/check-status', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id })
  });

  const data = await response.json();
  document.getElementById('remainingCount').textContent = data.remaining;

  document.getElementById('historySection').style.display = 'block';
  ladVerlauf();
}
  
  async function erklaeren() {
    const text = document.getElementById('inputText').value.trim();
    if (!text) { alert('Bitte füge zuerst einen Text ein.'); return; }
  
    const { data: { session } } = await supabaseClient.auth.getSession();
    const user_id = session?.user?.id;
  
    const btn = document.getElementById('explainBtn');
    const resultCard = document.getElementById('resultCard');
    const resultText = document.getElementById('resultText');
  
    btn.disabled = true;
    btn.textContent = '⏳ Wird analysiert...';
    resultCard.style.display = 'block';
    resultText.innerHTML = '<span class="loading">KI analysiert deinen Text...</span>';
  
    try {
      const response = await fetch('/explain', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, user_id })
      });
      const data = await response.json();
  
      if (data.error === 'limit_reached') {
        resultText.innerHTML = `
          <span style="color:#dc2626; font-weight:bold;">⚠️ Tageslimit erreicht!</span><br><br>
          ${data.message}<br><br>
<button onclick="upgrade()" style="background:#059669; color:white; border:none; padding:12px 24px; border-radius:10px; font-size:1rem; cursor:pointer; font-weight:bold;">
  ⭐ Jetzt Premium werden — 9.99€/Monat
</button>
        `;
      } else {
        resultText.textContent = data.explanation;
        document.getElementById('remainingCount').textContent = data.remaining;
      }
    } catch (error) {
      resultText.textContent = 'Fehler. Bitte versuche es erneut.';
    }
  
    btn.disabled = false;
    btn.textContent = '✨ Jetzt erklären';
  }

  async function upgrade() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  const user_id = session?.user?.id;
  const email = session?.user?.email;

  const response = await fetch('/create-checkout', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ user_id, email })
  });

  const data = await response.json();
  if (data.url) {
    window.location.href = data.url;
  }
}

async function dokumentHochladen() {
  const fileInput = document.getElementById('fileInput');
  const file = fileInput.files[0];
  if (!file) return;

  const resultCard = document.getElementById('resultCard');
  const resultText = document.getElementById('resultText');

  resultCard.style.display = 'block';
  resultText.innerHTML = '<span class="loading">📄 Dokument wird analysiert...</span>';

  const formData = new FormData();
  formData.append('document', file);

  try {
    const response = await fetch('/upload-document', {
      method: 'POST',
      body: formData
    });

    const data = await response.json();

    if (data.error) {
      resultText.textContent = 'Fehler: ' + data.error;
    } else {
      resultText.textContent = data.explanation;
    }
  } catch (error) {
    resultText.textContent = 'Fehler beim Hochladen. Bitte versuche es erneut.';
  }

  fileInput.value = '';
}

async function fotoAnalysieren() {
  const imageInput = document.getElementById('imageInput');
  const file = imageInput.files[0];
  if (!file) return;

  const resultCard = document.getElementById('resultCard');
  const resultText = document.getElementById('resultText');

  resultCard.style.display = 'block';
  resultText.innerHTML = '<span class="loading">📷 Foto wird analysiert... Das kann 10-20 Sekunden dauern.</span>';

  const formData = new FormData();
  formData.append('image', file);

  try {
    const response = await fetch('/analyze-image', {
      method: 'POST',
      body: formData
    });

    const data = await response.json();

    if (data.error) {
      resultText.textContent = 'Fehler: ' + data.error;
    } else {
      resultText.textContent = data.explanation;
    }
  } catch (error) {
    resultText.textContent = 'Fehler beim Analysieren. Bitte versuche es erneut.';
  }

  imageInput.value = '';
}

async function ladVerlauf() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  const user_id = session?.user?.id;

  const response = await fetch(`/history/${user_id}`);
  const data = await response.json();

  const historyList = document.getElementById('historyList');

  if (!data.history || data.history.length === 0) {
    historyList.innerHTML = '<p style="color:#9ca3af;">Noch keine Erklärungen vorhanden.</p>';
    return;
  }

  historyList.innerHTML = data.history.map(item => `
    <div style="border:1px solid #e5e7eb; border-radius:10px; padding:14px; margin-bottom:12px; cursor:pointer;" onclick="zeigeHistoryItem(this)">
      <div style="font-size:0.8rem; color:#9ca3af; margin-bottom:6px;">
        ${new Date(item.created_at).toLocaleDateString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' })}
      </div>
      <div style="color:#374151; font-size:0.9rem; font-weight:bold; margin-bottom:8px;">
        📝 ${item.input_text.substring(0, 80)}${item.input_text.length > 80 ? '...' : ''}
      </div>
      <div class="history-explanation" style="display:none; color:#6b7280; font-size:0.9rem; margin-top:8px; line-height:1.6;">
        ${item.explanation}
      </div>
      <div style="color:#2563eb; font-size:0.8rem; margin-top:4px;">▼ Erklärung anzeigen</div>
    </div>
  `).join('');
}

function zeigeHistoryItem(el) {
  const explanation = el.querySelector('.history-explanation');
  const arrow = el.querySelector('div:last-child');
  if (explanation.style.display === 'none') {
    explanation.style.display = 'block';
    arrow.textContent = '▲ Erklärung verbergen';
  } else {
    explanation.style.display = 'none';
    arrow.textContent = '▼ Erklärung anzeigen';
  }
}

</script>

</body>
</html>
