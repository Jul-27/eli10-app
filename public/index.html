<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ELI10 — Einfach erklärt</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f0f4ff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px 20px;
      }

      h1 {
        font-size: 2rem;
        color: #2563eb;
        margin-bottom: 8px;
      }

      .subtitle {
        color: #6b7280;
        margin-bottom: 30px;
        text-align: center;
      }

      .card {
        background: white;
        border-radius: 16px;
        padding: 24px;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        margin-bottom: 20px;
      }

      textarea {
        width: 100%;
        height: 150px;
        border: 2px solid #e5e7eb;
        border-radius: 10px;
        padding: 14px;
        font-size: 1rem;
        resize: vertical;
        outline: none;
        transition: border 0.2s;
      }

      textarea:focus {
        border-color: #2563eb;
      }

      button {
        margin-top: 14px;
        width: 100%;
        padding: 14px;
        background: #2563eb;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover {
        background: #1d4ed8;
      }
      button:disabled {
        background: #93c5fd;
        cursor: not-allowed;
      }

      .result-card {
        background: white;
        border-radius: 16px;
        padding: 24px;
        width: 100%;
        max-width: 600px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        display: none;
      }

      .result-card h2 {
        color: #2563eb;
        margin-bottom: 12px;
      }

      .result-text {
        color: #374151;
        line-height: 1.7;
        white-space: pre-wrap;
      }

      .loading {
        text-align: center;
        color: #6b7280;
        font-style: italic;
      }

      .disclaimer {
        font-size: 0.75rem;
        color: #9ca3af;
        text-align: center;
        margin-top: 20px;
        max-width: 600px;
      }
    </style>
  </head>
  <body>
    <h1>🧒 ELI10</h1>
    <p class="subtitle">
      Füge einen komplexen Text ein — wir erklären ihn einfach.
    </p>

    <div class="card">
      <textarea
        id="inputText"
        placeholder="Füge hier deinen Text ein... z.B. einen Vertragsabschnitt, einen Arztbrief oder einen Behördenbrief."
      ></textarea>
      <button id="explainBtn" onclick="erklaeren()">✨ Jetzt erklären</button>
    </div>

    <div class="result-card" id="resultCard">
      <h2>📖 Erklärung</h2>
      <div class="result-text" id="resultText"></div>
    </div>

    <p class="disclaimer">
      ⚠️ ELI10 ist kein Ersatz für rechtliche, medizinische oder steuerliche
      Beratung.
    </p>

    <script>
      async function erklaeren() {
        const text = document.getElementById('inputText').value.trim();

        if (!text) {
          alert('Bitte füge zuerst einen Text ein.');
          return;
        }

        const btn = document.getElementById('explainBtn');
        const resultCard = document.getElementById('resultCard');
        const resultText = document.getElementById('resultText');

        btn.disabled = true;
        btn.textContent = '⏳ Wird analysiert...';
        resultCard.style.display = 'block';
        resultText.innerHTML =
          '<span class="loading">KI analysiert deinen Text...</span>';

        try {
          const response = await fetch('/explain', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text }),
          });

          const data = await response.json();
          resultText.textContent = data.explanation;
        } catch (error) {
          resultText.textContent =
            'Fehler beim Abrufen der Erklärung. Bitte versuche es erneut.';
        }

        btn.disabled = false;
        btn.textContent = '✨ Jetzt erklären';
      }
    </script>
  </body>
</html>
